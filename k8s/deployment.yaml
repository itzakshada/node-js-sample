apiVersion: apps/v1
kind: Deployment

metadata:
  name: nodeapp-deployment
  labels:
    app: nodeapp

spec:
  replicas: 2
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: nodeapp

  template:
    metadata:
      labels:
        app: nodeapp

    spec:
      containers:
      - name: nodeapp

        image: akshada01.azurecr.io/nodeapp:latest

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5000

