trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: nodeapp
  dockerRegistryServiceConnection: 'ACRConnection'
  containerRegistry: 'Akshada01.azurecr.io'
  tag: '$(Build.BuildId)'

stages:

# ==========================
# BUILD STAGE
# ==========================
- stage: Build
  displayName: Build Stage

  jobs:
  - job: Build

    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
      displayName: Install Dependencies

    - script: |
        npm run build
      displayName: Build Application
- stage: Test
  displayName: Test Stage

  dependsOn: Build

  jobs:

  - job: Test

    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
    - script: |
        npm test
      displayName: Run Unit Tests
# ==========================
# PACKAGE STAGE
# ==========================
- stage: Package

  dependsOn: Build

  jobs:

  - job: DockerBuild

    steps:

    - task: Docker@2
      displayName: Build and Push Docker Image

      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: Dockerfile
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

# ==========================
# DEPLOY STAGE
# ==========================
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Package
  condition: succeeded()

  jobs:
  - deployment: DeployWebApp
    displayName: Deploy to Azure Web App
    environment: Production

    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureWebAppContainer@1
            displayName: Deploy Container

            inputs:
              azureSubscription: 'AzureConnection'
              appName: 'akshada-nodeapp123'
              containers: 'Akshada01.azurecr.io/nodeapp:latest'

