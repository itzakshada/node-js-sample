trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: nodeapp
  dockerRegistryServiceConnection: 'ACRConnection'
  containerRegistry: 'youracrname.azurecr.io'
  tag: '$(Build.BuildId)'

# ==========================
# BUILD STAGE
# ==========================
stages:

- stage: Build
  displayName: Build Stage

  jobs:
  - job: BuildJob
    displayName: Build Application

    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies

    - script: npm run build
      displayName: Build Application

# ==========================
# TEST STAGE
# ==========================
- stage: Test
  displayName: Test Stage
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: TestJob
    displayName: Execute Tests

    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies

    - script: npm test
      displayName: Run Unit Tests

# ==========================
# PACKAGE STAGE
# ==========================
- stage: Package
  displayName: Package Stage
  dependsOn: Test
  condition: succeeded()

  jobs:
  - job: DockerBuild
    displayName: Build and Push Docker Image

    steps:
    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: Dockerfile
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

# ==========================
# DEPLOY STAGE
# ==========================
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Package
  condition: succeeded()

  jobs:
  - deployment: DeployWebApp
    displayName: Deploy to Azure Web App
    environment: Production

    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: Deploy Container

            inputs:
              azureSubscription: 'AzureConnection'
              appName: 'akshada-nodeapp'
              containers: 'youracrname.azurecr.io/nodeapp:latest'
