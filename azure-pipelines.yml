trigger:
  - main

pool:
  name: Default

variables:
  imageRepository: 'nodeapp'
  dockerRegistryServiceConnection: 'ACRConnection'
  containerRegistry: 'akshada01.azurecr.io'
  tag: '$(Build.BuildId)'

stages:

# =====================================
# BUILD STAGE
# =====================================
- stage: Build
  displayName: 'Build Stage'

  jobs:
  - job: BuildJob
    displayName: 'Build Application'

    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
      displayName: 'Install Dependencies'

    - task: CopyFiles@2
      displayName: 'Copy Files'
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'nodeapp'
        publishLocation: 'Container'


# =====================================
# TEST STAGE
# =====================================
- stage: Test
  displayName: 'Test Stage'
  dependsOn: Build

  jobs:
  - job: TestJob
    displayName: 'Run Tests'

    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
        npm test || echo "No tests found"
      displayName: 'Execute Tests'


# =====================================
# PACKAGE STAGE
# =====================================
- stage: Package
  displayName: 'Docker Package Stage'
  dependsOn: Test

  jobs:
  - job: DockerBuildPush
    displayName: 'Build and Push Docker Image'

    steps:
    - checkout: self

    - task: Docker@2
      displayName: 'Build and Push Docker Image'
      inputs:
        command: 'buildAndPush'
        repository: '$(imageRepository)'
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        containerRegistry: '$(dockerRegistryServiceConnection)'
        tags: |
          $(Build.BuildId)
          latest


# =====================================
# DEPLOY TO AZURE WEB APP
# =====================================
- stage: DeployWebApp
  displayName: 'Deploy To Azure Web App'
  dependsOn: Package
  condition: succeeded()

  jobs:
  - deployment: DeployWebAppJob
    displayName: 'Deploy to Azure Web App'
    environment: 'Production'

    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Deploy Container to Azure Web App'
            inputs:
              azureSubscription: 'AzureConnection'
              appName: 'akshada-nodeapp123'
              containers: 'akshada01.azurecr.io/nodeapp:$(Build.BuildId)'


# =====================================
# DEPLOY TO KUBERNETES
# =====================================
- stage: DeployK8s
  displayName: 'Deploy To Kubernetes'
  dependsOn: Package
  condition: succeeded()

  jobs:
  - job: DeployKubernetes
    displayName: 'Deploy to Minikube Kubernetes'

    steps:
    - checkout: self

    - script: |
        export KUBECONFIG=/home/azureuser/.kube/config

        echo "Checking Kubernetes configuration..."
        kubectl version --client
        kubectl config current-context
        kubectl get nodes
      displayName: 'Verify Kubernetes Cluster'

    - script: |
        export KUBECONFIG=/home/azureuser/.kube/config

        echo "Applying Kubernetes manifests..."
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

        echo "Updating Kubernetes deployment image to current build..."
        kubectl set image deployment/nodeapp-deployment \
          nodeapp=akshada01.azurecr.io/nodeapp:$(Build.BuildId)

        echo "Waiting for Kubernetes rollout..."
        kubectl rollout status deployment/nodeapp-deployment

        echo "Current Kubernetes deployed image:"
        kubectl get deployment nodeapp-deployment -o jsonpath='{.spec.template.spec.containers[0].image}'
        echo ""
      displayName: 'Deploy to Kubernetes'
