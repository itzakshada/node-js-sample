trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: nodeapp
  dockerRegistryServiceConnection: 'ACRConnection'
  containerRegistry: 'akshada01.azurecr.io'
  tag: '$(Build.BuildId)'

stages:

# =====================================
# BUILD STAGE
# =====================================
- stage: Build
  displayName: Build Stage

  jobs:
  - job: BuildJob
    displayName: Build Application

    steps:

    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: Install Node.js

    - script: |
        npm install
      displayName: Install Dependencies

    - task: CopyFiles@2
      displayName: Copy Files
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: PublishBuildArtifacts@1
      displayName: Publish Build Artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'nodeapp'
        publishLocation: 'Container'

# =====================================
# TEST STAGE
# =====================================
- stage: Test
  displayName: Test Stage
  dependsOn: Build

  jobs:
  - job: TestJob
    displayName: Run Tests

    steps:

    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
        npm test || echo "No tests found"
      displayName: Execute Tests

# =====================================
# PACKAGE STAGE
# =====================================
- stage: Package
  displayName: Docker Package Stage
  dependsOn: Test

  jobs:
  - job: DockerBuildPush
    displayName: Build and Push Docker Image

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: Dockerfile
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

# =====================================
# DEPLOY STAGE
# =====================================
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Package
  condition: succeeded()

  jobs:
  - deployment: DeployWebApp
    displayName: Deploy to Azure Web App
    environment: Production

    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureWebAppContainer@1
            displayName: Deploy Container

            inputs:
              azureSubscription: 'AzureConnection'
              appName: 'akshada-nodeapp123'
              containers: 'akshada01.azurecr.io/nodeapp:latest'
